services:
  postgres:
    image: postgres:18.3
    container_name: eventapp-db-dev
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: eventapp-pgadmin-dev
    env_file:
      - ./backend/.env
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
